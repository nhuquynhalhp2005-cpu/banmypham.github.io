<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Mỹ Phẩm Quỳnh</title>
<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #ffe6f0;
    }
    header {
        background: #ff66a3;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 24px;
    }
    .container {
        padding: 20px;
    }
    .product {
        background: white;
        padding: 15px;
        margin: 10px;
        border-radius: 10px;
        display: inline-block;
        width: 200px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .product img {
        width: 100%;
        border-radius: 10px;
    }
    button {
        background: #ff66a3;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #ff3385;
    }
</style>
</head>

<body>

<header>💄 Shop Mỹ Phẩm Quỳnh 💄</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Son môi</h3>
        <p>350.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Kem dưỡng</h3>
        <p>250.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Nước hoa</h3>
        <p>500.000đ</p>
        <button>Mua ngay</button>
    </div>

</div>

</body>
</html>
